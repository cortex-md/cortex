name: Publish Plugin API

on:
  push:
    tags:
      - 'plugin-api-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.1.0)'
        required: true
        type: string

jobs:
  publish:
    name: Build and publish cortex-plugin-api
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: packages/plugin-api
        run: bun install

      - name: Extract version
        id: extract_version
        shell: bash
        run: |
          if [ "${{ github.event.inputs.version }}" != "" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            VERSION="${GITHUB_REF_NAME#plugin-api-v}"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Update version in package.json
        working-directory: packages/plugin-api
        run: |
          VERSION="${{ steps.extract_version.outputs.version }}"
          npm version "$VERSION" --no-git-tag-version

      - name: Build package
        working-directory: packages/plugin-api
        run: bun run build

      - name: Verify dist exists
        working-directory: packages/plugin-api
        run: |
          if [ ! -d "dist" ]; then
            echo "Error: dist directory not found after build"
            exit 1
          fi
          ls -la dist/

      - name: Publish to npm
        working-directory: packages/plugin-api
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Plugin API v${{ steps.extract_version.outputs.version }}
          body: |
            ## cortex-plugin-api v${{ steps.extract_version.outputs.version }}
            
            Plugin API package for Cortex plugin developers.
            
            ### Installation
            
            ```bash
            npm install cortex-plugin-api@${{ steps.extract_version.outputs.version }}
            ```
            
            Or with bun:
            
            ```bash
            bun add cortex-plugin-api@${{ steps.extract_version.outputs.version }}
            ```
            
            ### Documentation
            
            See the [Plugin API documentation](https://github.com/cortex-md/cortex/tree/main/packages/plugin-api) for usage details.
            
            ### What's New
            
            Check the [CHANGELOG](https://github.com/cortex-md/cortex/blob/main/packages/plugin-api/CHANGELOG.md) for detailed changes.
          draft: false
          prerelease: false
